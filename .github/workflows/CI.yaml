name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0.{{ github.run_number }} .
      - name: push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0.{{ github.run_number }}