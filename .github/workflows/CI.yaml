name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:latest .
      - name: tag image      
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:latest ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0.${{ github.run_number }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:latest ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0
          docker tag ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:latest ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0
      - name: push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0.${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0.0
          docker push ${{ secrets.DOCKER_USERNAME }}/ourpaintwww:0